<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors</title>
</head>
<body>
  <p>
    Rock Paper Scissors
  </p>
  <button onclick="
  const var1 = Math.random();
  if(var1>=0 && var1<1/3 ) { const var2 =('Rock');alert(`Computer move : ${var2} and your move : Rock so it is a Draw`);} 
  else if (var1>= 1/3 && var1 < 2/3){const var2 =('Paper'); alert(`Computer move : ${var2} and your move : Rock so you LOST`);}
  else if (var1 >= 2/3 && var1 <1){ const var2=('Scissors'); alert(`Computer move : ${var2} and your move : Rock so you WIN`);}">Rock</button>

  <button  onclick="
  const var3 = Math.random();
  if(var3>=0 && var3<1/3 ) { const var4 =('Rock'); alert(`Computer move : ${var4} and your move : Paper so it is a WIN`);} 
  else if (var3>= 1/3 && var3 < 2/3){const var4 =('Paper'); alert(`Computer move : ${var4} and your move : Paper so it is a Draw`);}
  else if (var3 >= 2/3 && var3 <1){ const var4=('Scissors'); alert(`Computer move : ${var4} and your move : Paper so you LOST`);}">Paper</button>

  <button onclick="
  const var5 = Math.random();
  if(var5>=0 && var5<1/3 ) { const var6 =('Rock'); alert(`Computer move : ${var6} and your move : Scissors so you LOST`);} 
  else if (var5>= 1/3 && var5 < 2/3){const var6 =('Paper'); alert(`Computer move : ${var6} and your move : Scissors so it is a WIN`);}
  else if (var5>= 2/3 && var5 <1){ const var6=('Scissors'); alert(`Computer move : ${var6} and your move : Scissors so you WIN`);}">Scissors</button>
</body>
